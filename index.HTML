<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Pokédex API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstra
p.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white p-5">
    <div class="container text-center" style="max-width: 500px;">
        <h1 class="text-warning mb-4">Pokédex Hunter</h1>

        <input type="text" id="in-pokemon" class="form-control mb-3"
            placeholder="Digite o nome (ex: pikachu) ou número...">
        <button onclick="buscarPokemon()" class="btn btn-primary w-100 mb-4">Buscar no Servidor</button>

        <div id="tela-resultado" class="card bg-secondary text-white p-3 shadow">
            <p>Aguardando busca...</p>
        </div>
    </div>
    <script>
        let tela = document.getElementById('tela-resultado');

        async function buscarPokemon() {
            let pokemonDigitado = document.getElementById('in-pokemon').value.toLowerCase();

            let urlApi = `https://pokeapi.co/api/v2/pokemon/${pokemonDigitado}`;

            let resposta = await fetch(urlApi);

            if (!resposta.ok) {
                tela.innerHTML = `
                <h3 class="text-danger">Pokemon não encontrado</h3>
            `
                return;
            }

            let dadosJson = await resposta.json();

            console.log(dadosJson);

            desenharNaTela(dadosJson);
        }
        function desenharNaTela(dados) {
            tela.innerHTML = `
        <h3>${dados.name.toUpperCase()}</h3>
        <img src="${dados.sprites.front_default}" alt="Foto do Pokemon" width="150">
        <p><strong>Peso:</strong> ${dados.weight / 10} kg</p>
        <p><strong>Tipo 1:</strong> ${dados.types[0].type.name}</p>
        ${dados.types.length > 1 ? `<p><strong>Tipo 2:</strong> ${dados.types[1].type.name}</p>` : ""}
    `;
        }

    </script>
</body>

</html>
